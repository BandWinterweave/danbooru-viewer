version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      vite-toolchain:
        patterns:
          - vite
          - '@vitejs/*'
          - vitest
          - '@vitest/*'
          - '@crxjs/*'
      testing-and-linting:
        patterns:
          - '@playwright/*'
          - eslint
          - eslint-*
          - typescript-eslint
          - prettier
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
